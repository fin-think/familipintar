            score: 0,
            selectedOption: null,
            isAnswered: false
        };

        const container = document.getElementById('app-container');

        function setView(viewName) {
            state.view = viewName;
            render();
        }

        function startLevel(levelId) {
            const level = quizData.find(l => l.id === levelId);
            state.currentLevel = level;
            state.currentQuestionIndex = 0;
            state.score = 0;
            state.selectedOption = null;
            state.isAnswered = false;
            setView('play');
        }

        function handleAnswer(index) {
            if (state.isAnswered) return;
            state.selectedOption = index;
            state.isAnswered = true;
            if (index === state.currentLevel.questions[state.currentQuestionIndex].ans) {
                state.score++;
            }
            render();
        }

        function handleNext() {
            if (state.currentQuestionIndex < state.currentLevel.questions.length - 1) {
                state.currentQuestionIndex++;
                state.selectedOption = null;
                state.isAnswered = false;
                render();
            } else {
                setView('result');
            }
        }

        function render() {
            container.innerHTML = '';
            if (state.view === 'home') renderHome();
            else if (state.view === 'play') renderPlay();
            else if (state.view === 'result') renderResult();
        }

        function renderHome() {
            const lowLevels = quizData.filter(l => l.id.startsWith('t') && !l.id.startsWith('tg'));
            const highLevels = quizData.filter(l => l.id.startsWith('tg'));

            container.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-screen p-6 fade-in">
                    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-5xl w-full text-center">
                        <div class="flex justify-center mb-6">
                            <div class="bg-blue-600 p-4 rounded-full shadow-lg">
                                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                            </div>
                        </div>
                        <h1 class="text-4xl font-extrabold text-slate-800 mb-2">mySAINS</h1>
                        <p class="text-slate-500 mb-8 text-lg">Pilih tahap untuk bermula. Merangkumi silibus lengkap KPM.</p>
                        
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 text-left">
                            <div class="bg-blue-50 rounded-xl p-6 border border-blue-100">
                                <h2 class="text-xl font-bold text-blue-800 mb-4 border-b border-blue-200 pb-2">Sekolah Rendah</h2>
                                <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                    ${lowLevels.map(l => `
                                        <button onclick="startLevel('${l.id}')" class="bg-white hover:bg-blue-600 hover:text-white text-blue-700 font-bold py-3 px-2 border border-blue-200 rounded-lg shadow-sm transition-all duration-200 text-sm">
                                            ${l.name}
                                        </button>
                                    `).join('')}
                                </div>
                            </div>

                            <div class="bg-emerald-50 rounded-xl p-6 border border-emerald-100">
                                <h2 class="text-xl font-bold text-emerald-800 mb-4 border-b border-emerald-200 pb-2">Sekolah Menengah</h2>
                                <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                    ${highLevels.map(l => `
                                        <button onclick="startLevel('${l.id}')" class="bg-white hover:bg-emerald-600 hover:text-white text-emerald-700 font-bold py-3 px-2 border border-emerald-200 rounded-lg shadow-sm transition-all duration-200 text-sm">
                                            ${l.name}
                                        </button>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPlay() {
            const q = state.currentLevel.questions[state.currentQuestionIndex];
            const total = state.currentLevel.questions.length;
            const progress = ((state.currentQuestionIndex) / total) * 100;

            container.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-screen p-4 fade-in">
                    <div class="w-full max-w-3xl">
                        <div class="flex items-center justify-between bg-white rounded-xl shadow-sm p-4 mb-6">
                            <button onclick="setView('home')" class="text-slate-500 hover:text-slate-800 font-medium flex items-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                                Menu
                            </button>
                            <div class="text-lg font-bold text-slate-700 bg-slate-100 py-1 px-4 rounded-full">${state.currentLevel.name}</div>
                            <div class="text-md font-semibold text-blue-600">${state.currentQuestionIndex + 1} / ${total}</div>
                        </div>

                        <div class="w-full bg-slate-200 rounded-full h-2 mb-6">
                            <div class="bg-blue-600 h-2 rounded-full transition-all duration-500" style="width: ${progress}%"></div>
                        </div>

                        <div class="bg-white rounded-2xl shadow-lg p-6 sm:p-8 mb-6 border border-slate-100">
                            <h2 class="text-2xl sm:text-2xl font-bold text-slate-800 mb-8 leading-tight">${q.q}</h2>
                            <div class="grid grid-cols-1 gap-4">
                                ${q.opts.map((opt, idx) => {
                                    let cls = "bg-slate-50 border-slate-200 text-slate-700 hover:border-blue-300";
                                    let icon = "";
                                    if (state.isAnswered) {
                                        if (idx === q.ans) {
                                            cls = "correct-bg border-2";
                                            icon = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
                                        } else if (idx === state.selectedOption) {
                                            cls = "wrong-bg border-2";
                                            icon = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
                                        } else {
                                            cls = "neutral-bg border-2";
                                        }
                                    }
                                    return `
                                        <button onclick="handleAnswer(${idx})" ${state.isAnswered ? 'disabled' : ''} class="flex items-center justify-between text-left p-4 rounded-xl border-2 font-bold text-lg transition-all ${cls}">
                                            <span>${opt}</span>
                                            ${icon}
                                        </button>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        ${state.isAnswered ? `
                            <div class="rounded-2xl p-6 mb-6 shadow-sm border-l-8 fade-in ${state.selectedOption === q.ans ? 'bg-emerald-50 border-emerald-500' : 'bg-red-50 border-red-500'}">
                                <p class="text-slate-700 font-medium"><strong>Ulasan:</strong> ${q.exp}</p>
                            </div>
                            <div class="flex justify-end">
                                <button onclick="handleNext()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-transform active:scale-95 flex items-center gap-2">
                                    Seterusnya
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                                </button>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function renderResult() {
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-screen p-6 fade-in text-center">
                    <div class="bg-white rounded-3xl shadow-2xl p-10 max-w-md w-full">
                        <h1 class="text-3xl font-black text-slate-800 mb-2">Keputusan</h1>
                        <p class="text-xl text-slate-500 font-bold mb-6">${state.currentLevel.name}</p>
                        <div class="text-7xl font-black mb-6 text-blue-600">
                            ${state.score}<span class="text-2xl text-slate-300">/10</span>
                        </div>
                        <div class="flex flex-col gap-3">
                            <button onclick="startLevel('${state.currentLevel.id}')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all">Cuba Lagi</button>
                            <button onclick="setView('home')" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-4 rounded-xl transition-all">Menu Utama</button>
                        </div>
                    </div>
                </div>
            `;
        }

        window.onload = render;
    </script>
</body>
</html>
